<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond Mars — Kies je moment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bm-red:#E8372A;--bm-navy:#0D1B2A;
  --bg:#F7F6F3;--text:#1A1A1A;--text2:#555;--text3:#999;
  --border:#DDD;--border2:#BBB;
  --success-bg:#EAF3DE;--success-text:#27500A;
  --danger-bg:#FCEBEB;--danger-text:#791F1F;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
.main-wrap{max-width:560px;margin:0 auto;padding:40px 16px 60px}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px 32px}
@media(max-width:500px){.card{padding:20px 16px}}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:9px;border:1px solid var(--border2);background:#fff;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-primary{background:var(--bm-red);color:#fff;border-color:var(--bm-red)}
.btn-primary:hover{background:#c52d22}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.slot{padding:14px 18px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.slot:hover{background:#F7F6F3;border-color:var(--border2)}
.slot.selected{border-color:var(--bm-red);background:#FFF5F5}
.slot.full{opacity:.4;cursor:not-allowed;background:#F7F6F3}
.slot-title{font-weight:600;font-size:15px}
.slot-meta{font-size:13px;color:var(--text2);margin-top:3px}
.spots{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:4px}
.spots-ok{background:var(--success-bg);color:var(--success-text)}
.spots-full{background:#F0EFE9;color:var(--text3)}
.logo{font-size:16px;font-weight:700;color:var(--bm-red);margin-bottom:6px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="main-wrap">
  <div id="app"></div>
</div>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/beyondmars.be/s/AKfycbw7XMvI7txVdIV-Qav60xeYGnjqfk1VvdPM6fuCvsmdx-7YGWeqT6i6pnIqOGzYRRw6eQ/exec
';

const DIV_LABELS={smile:'Beyond the Smile',serve:'Serve',stage:'Stage'};

let candId='';
let div='';
let sessions=[];
let selected=null;
let submitting=false;
let state='loading'; // loading | choose | confirm | error

function e(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Haal candId en div uit de URL: ?id=xxx&div=smile
function getParams(){
  const p=new URLSearchParams(window.location.search);
  candId=p.get('id')||'';
  div=p.get('div')||'';
}

async function loadSessions(){
  getParams();
  if(!candId||!div){state='error';render();return;}
  try{
    if(APPS_SCRIPT_URL==='JOUW_APPS_SCRIPT_URL_HIER'){
      // Demo
      await new Promise(r=>setTimeout(r,600));
      const isServe=div==='serve';
      sessions=[
        {id:'s1',date:'Maandag 30 juni',time:'09:00',capacity:isServe?10:1,booked:0,duration:isServe?90:30},
        {id:'s2',date:'Dinsdag 1 juli',time:'10:30',capacity:isServe?10:1,booked:isServe?4:0,duration:isServe?90:30},
        {id:'s3',date:'Woensdag 2 juli',time:'14:00',capacity:isServe?10:1,booked:isServe?10:0,duration:isServe?90:30},
        {id:'s4',date:'Donderdag 3 juli',time:'09:00',capacity:isServe?10:1,booked:isServe?2:0,duration:isServe?90:30},
      ];
    } else {
      const r=await fetch(`${APPS_SCRIPT_URL}?action=getSessions&div=${div}`);
      const d=await r.json();
      sessions=d.sessions||[];
    }
    state='choose';
  }catch(err){state='error';}
  render();
}

async function bookSlot(){
  if(!selected||submitting)return;
  submitting=true;render();
  try{
    if(APPS_SCRIPT_URL!=='JOUW_APPS_SCRIPT_URL_HIER'){
      await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({
        action:'bookSession',candId,sessionId:selected
      })});
    } else {
      await new Promise(r=>setTimeout(r,800));
    }
    state='confirm';
  }catch(err){state='error';}
  submitting=false;
  render();
}

function render(){
  const app=document.getElementById('app');
  const divLabel=DIV_LABELS[div]||div;

  if(state==='loading'){
    app.innerHTML=`<div class="card" style="text-align:center;padding:50px">
      <div style="font-size:28px;margin-bottom:10px">⏳</div>
      <div style="color:var(--text2)">Beschikbare momenten laden…</div>
    </div>`;
    return;
  }

  if(state==='error'){
    app.innerHTML=`<div class="card" style="text-align:center;padding:50px">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div style="font-weight:600;margin-bottom:8px">Ongeldige link</div>
      <div style="color:var(--text2);font-size:13px">Deze link is niet geldig of reeds gebruikt. Neem contact op via hello@beyondmars.be</div>
    </div>`;
    return;
  }

  if(state==='confirm'){
    const sess=sessions.find(s=>s.id===selected);
    app.innerHTML=`<div class="card" style="text-align:center;padding:50px 28px">
      <div style="font-size:52px;margin-bottom:14px">✅</div>
      <div style="font-weight:700;font-size:20px;margin-bottom:10px">Moment bevestigd!</div>
      <p style="color:var(--text2);font-size:14px;margin-bottom:20px">
        Je inschrijving is geregistreerd. Je ontvangt een bevestigingsmail met alle details.
      </p>
      ${sess?`<div style="background:#F7F6F3;border-radius:10px;padding:16px 20px;font-size:14px;display:inline-block;text-align:left">
        <div style="font-weight:600;margin-bottom:4px">📅 ${e(sess.date)} om ${e(sess.time)}</div>
        <div style="color:var(--text2)">${divLabel} · ${sess.duration} minuten</div>
      </div>`:''}
    </div>`;
    return;
  }

  const isServe=div==='serve';
  const availableSessions=sessions.filter(s=>s.booked<s.capacity);

  app.innerHTML=`
    <div class="card">
      <div class="logo">Beyond Mars</div>
      <h1 style="font-size:20px;font-weight:700;margin-bottom:6px">Kies je moment</h1>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px">
        Je bent uitgenodigd voor <strong>${divLabel}</strong>. 
        Kies hieronder een ${isServe?'groepssessie ('+90+' min)':'tijdslot (30 min)'} dat past.
      </p>

      ${sessions.length===0
        ?`<div style="text-align:center;padding:28px;color:var(--text3);background:#F7F6F3;border-radius:10px;font-size:13px">
            Er zijn momenteel geen beschikbare momenten. We nemen binnenkort contact met je op.
          </div>`
        :sessions.map(s=>{
          const isFull=s.booked>=s.capacity;
          const spots=s.capacity-s.booked;
          const isSel=selected===s.id;
          return `<div class="slot${isSel?' selected':''}${isFull?' full':''}" onclick="${!isFull?`selected='${s.id}';render()`:'' }">
            <div class="slot-title">${e(s.date)} · ${e(s.time)}</div>
            <div class="slot-meta">${divLabel} · ${s.duration} minuten</div>
            ${isServe?`<span class="spots ${isFull?'spots-full':'spots-ok'}">${isFull?'Volzet':`${spots} plaats${spots===1?'':'en'} beschikbaar`}</span>`:''}
          </div>`;
        }).join('')}

      ${sessions.length>0?`
      <div class="divider"></div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-primary" onclick="bookSlot()" ${!selected||submitting?'disabled':''}>
          ${submitting?'<span class="spinner"></span> Bezig…':'Moment bevestigen →'}
        </button>
      </div>`:''}
    </div>`;
}

loadSessions();
</script>
</body>
</html>
